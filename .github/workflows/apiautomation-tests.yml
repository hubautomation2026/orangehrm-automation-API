name: API Automation Tests 🎭

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * *'   # runs every day at 9:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

# ─────────────────────────────────────────────────────────────────────────────
# SHARED SETUP — reusable across all jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  BASE_URL:       ${{ secrets.BASE_URL }}
  REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
  CI: true

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 0: INSTALL & CACHE
  # Runs once — all test jobs wait for this before starting
  # ───────────────────────────────────────────────────────────────────────────
  install:
    name: 📦 Install & Cache Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 💾 Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: LOGIN TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-login:
    name: 🔐 01 - Login Tests
    runs-on: ubuntu-latest
    needs: install       # waits for install job to finish first
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Login Tests
        run: npx playwright test tests/01-login.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload Login Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-01-login
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: DASHBOARD TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-dashboard:
    name: 📊 02 - Dashboard Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Dashboard Tests
        run: npx playwright test tests/02-dashboard.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload Dashboard Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-02-dashboard
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: PIM TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-pim:
    name: 👥 03 - PIM Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run PIM Tests
        run: npx playwright test tests/03-pim.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload PIM Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-03-pim
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4: LEAVE TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-leave:
    name: 🏖️ 04 - Leave Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Leave Tests
        run: npx playwright test tests/04-leave.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload Leave Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-04-leave
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5: ADMIN TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-admin:
    name: 🔑 05 - Admin Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Admin Tests
        run: npx playwright test tests/05-admin.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload Admin Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-05-admin
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6: MY INFO TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-myinfo:
    name: 👤 06 - My Info Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run My Info Tests
        run: npx playwright test tests/06-myinfo.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload My Info Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-06-myinfo
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 7: RECRUITMENT TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-recruitment:
    name: 💼 07 - Recruitment Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Recruitment Tests
        run: npx playwright test tests/07-recruitment.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload Recruitment Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-07-recruitment
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 8: DIRECTORY TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-directory:
    name: 📁 08 - Directory Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Directory Tests
        run: npx playwright test tests/08-directory.spec.ts --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload Directory Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-08-directory
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 9: API TESTS
  # ───────────────────────────────────────────────────────────────────────────
  test-api:
    name: 🌐 09 - API Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run API Tests
        run: npx playwright test tests/api/ --reporter=line,html,junit
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          CI: true

      - name: 📊 Upload API Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-09-api
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 10: FINAL SUMMARY
  # Runs AFTER all test jobs — collects results and shows final status
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: 📋 Final Summary
    runs-on: ubuntu-latest
    # Wait for ALL test jobs to finish (even if some fail)
    needs:
      - test-login
      - test-dashboard
      - test-pim
      - test-leave
      - test-admin
      - test-myinfo
      - test-recruitment
      - test-directory
      - test-api
    if: always()   # run even if some jobs failed
    steps:
      - name: ✅ Check results
        run: |
          echo "════════════════════════════════════"
          echo "         TEST SUITE SUMMARY         "
          echo "════════════════════════════════════"
          echo "🔐 Login       : ${{ needs.test-login.result }}"
          echo "📊 Dashboard   : ${{ needs.test-dashboard.result }}"
          echo "👥 PIM         : ${{ needs.test-pim.result }}"
          echo "🏖️  Leave       : ${{ needs.test-leave.result }}"
          echo "🔑 Admin       : ${{ needs.test-admin.result }}"
          echo "👤 My Info     : ${{ needs.test-myinfo.result }}"
          echo "💼 Recruitment : ${{ needs.test-recruitment.result }}"
          echo "📁 Directory   : ${{ needs.test-directory.result }}"
          echo "🌐 API         : ${{ needs.test-api.result }}"
          echo "════════════════════════════════════"

      # Fail the summary job if ANY test job failed
      - name: 🚨 Fail if any tests failed
        if: |
          needs.test-login.result == 'failure' ||
          needs.test-dashboard.result == 'failure' ||
          needs.test-pim.result == 'failure' ||
          needs.test-leave.result == 'failure' ||
          needs.test-admin.result == 'failure' ||
          needs.test-myinfo.result == 'failure' ||
          needs.test-recruitment.result == 'failure' ||
          needs.test-directory.result == 'failure' ||
          needs.test-api.result == 'failure'
        run: |
          echo "❌ One or more test suites FAILED!"
          exit 1